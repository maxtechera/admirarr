<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#162848"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hatGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="50%" stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F2040"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Radial glow -->
  <ellipse cx="600" cy="220" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#D4A843" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Logo (scaled up octopus at left) -->
  <g transform="translate(80, 160) scale(1.4)">
    <!-- Tentacles back -->
    <path d="M58 95 Q45 110 38 125 Q32 138 28 148 Q26 154 30 152 Q34 148 38 140 Q44 128 50 115 Q54 108 58 100" fill="#0A1628" opacity="0.8"/>
    <path d="M142 95 Q155 110 162 125 Q168 138 172 148 Q174 154 170 152 Q166 148 162 140 Q156 128 150 115 Q146 108 142 100" fill="#0A1628" opacity="0.8"/>
    <path d="M65 98 Q52 118 42 132 Q35 142 32 150 Q30 156 34 153 Q38 148 44 138 Q52 124 60 110 Q64 104 66 100" fill="#0A1628" opacity="0.85"/>
    <path d="M135 98 Q148 118 158 132 Q165 142 168 150 Q170 156 166 153 Q162 148 156 138 Q148 124 140 110 Q136 104 134 100" fill="#0A1628" opacity="0.85"/>
    <!-- Front tentacles -->
    <path d="M80 105 Q72 130 68 148 Q65 160 64 168 Q63 174 67 171 Q71 166 74 155 Q78 140 82 122 Q83 113 82 108" fill="#162848"/>
    <path d="M120 105 Q128 130 132 148 Q135 160 136 168 Q137 174 133 171 Q129 166 126 155 Q122 140 118 122 Q117 113 118 108" fill="#162848"/>
    <path d="M95 108 Q91 134 90 152 Q89 164 89 172 Q88 178 92 175 Q96 170 97 159 Q98 143 100 125 Q100 116 98 110" fill="#162848"/>
    <path d="M105 108 Q109 134 110 152 Q111 164 111 172 Q112 178 108 175 Q104 170 103 159 Q102 143 100 125 Q100 116 102 110" fill="#162848"/>
    <!-- Hat -->
    <path d="M55 72 Q55 38 100 35 Q145 38 145 72 L148 82 Q100 78 52 82 Z" fill="url(#hatGold)"/>
    <rect x="48" y="78" width="104" height="12" rx="6" fill="url(#hatGold)"/>
    <!-- Hat band -->
    <rect x="55" y="72" width="90" height="8" fill="#0A1628" opacity="0.3"/>
    <!-- Hat buckle -->
    <rect x="87" y="70" width="26" height="12" rx="2" fill="#0A1628" opacity="0.4"/>
    <rect x="91" y="73" width="18" height="6" rx="1" fill="url(#hatGold)" opacity="0.6"/>
    <!-- Body -->
    <ellipse cx="100" cy="100" rx="45" ry="42" fill="url(#bodyGrad)" stroke="#1a3060" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="83" cy="92" r="9" fill="#fff"/>
    <circle cx="117" cy="92" r="9" fill="#fff"/>
    <circle cx="85" cy="93" r="5" fill="#0A1628"/>
    <circle cx="119" cy="93" r="5" fill="#0A1628"/>
    <circle cx="86" cy="91" r="1.5" fill="#fff"/>
    <circle cx="120" cy="91" r="1.5" fill="#fff"/>
    <!-- Gold accents -->
    <circle cx="100" cy="108" r="4" fill="#D4A843" opacity="0.6"/>
    <circle cx="88" cy="112" r="2.5" fill="#D4A843" opacity="0.4"/>
    <circle cx="112" cy="112" r="2.5" fill="#D4A843" opacity="0.4"/>
    <!-- Anchor -->
    <line x1="100" y1="115" x2="100" y2="130" stroke="#D4A843" stroke-width="2.5"/>
    <line x1="92" y1="125" x2="108" y2="125" stroke="#D4A843" stroke-width="2.5"/>
    <line x1="92" y1="130" x2="96" y2="125" stroke="#D4A843" stroke-width="2"/>
    <line x1="108" y1="130" x2="104" y2="125" stroke="#D4A843" stroke-width="2"/>
    <circle cx="100" cy="117" r="3" fill="#D4A843"/>
  </g>

  <!-- Heading -->
  <text x="400" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="#E8EDF5" letter-spacing="-2">Admirarr</text>
  <text x="400" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#8FA3C0">Command your *Arr fleet from one terminal</text>

  <!-- Divider -->
  <line x1="400" y1="295" x2="1100" y2="295" stroke="#D4A843" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Install command box -->
  <rect x="400" y="315" width="680" height="58" rx="10" fill="#0F2040" stroke="#D4A843" stroke-width="1" stroke-opacity="0.35"/>
  <text x="424" y="350" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="18" fill="#D4A843">$</text>
  <text x="445" y="350" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="18" fill="#E8EDF5">curl -fsSL https://get.admirarr.dev | sh</text>

  <!-- Stats row -->
  <g transform="translate(400, 400)">
    <!-- 26 commands -->
    <rect width="150" height="70" rx="8" fill="#1A2F50" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
    <text x="75" y="30" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#D4A843" text-anchor="middle">26</text>
    <text x="75" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#8FA3C0" text-anchor="middle">commands</text>

    <!-- 34 checks -->
    <rect x="165" width="150" height="70" rx="8" fill="#1A2F50" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
    <text x="240" y="30" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#D4A843" text-anchor="middle">34</text>
    <text x="240" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#8FA3C0" text-anchor="middle">diagnostic checks</text>

    <!-- 26+ platforms -->
    <rect x="330" width="150" height="70" rx="8" fill="#1A2F50" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
    <text x="405" y="30" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#D4A843" text-anchor="middle">26+</text>
    <text x="405" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#8FA3C0" text-anchor="middle">agent platforms</text>

    <!-- 15 min -->
    <rect x="495" width="165" height="70" rx="8" fill="#1A2F50" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
    <text x="577" y="30" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#D4A843" text-anchor="middle">15 min</text>
    <text x="577" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#8FA3C0" text-anchor="middle">zero to fleet</text>
  </g>

  <!-- Badge row -->
  <g transform="translate(400, 500)">
    <rect width="130" height="30" rx="15" fill="#D4A843" fill-opacity="0.12" stroke="#D4A843" stroke-width="1" stroke-opacity="0.35"/>
    <text x="65" y="20" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#D4A843" text-anchor="middle">⚡ Single binary</text>

    <rect x="145" width="130" height="30" rx="15" fill="#D4A843" fill-opacity="0.12" stroke="#D4A843" stroke-width="1" stroke-opacity="0.35"/>
    <text x="210" y="20" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#D4A843" text-anchor="middle">🤖 Agent Skills</text>

    <rect x="290" width="110" height="30" rx="15" fill="#D4A843" fill-opacity="0.12" stroke="#D4A843" stroke-width="1" stroke-opacity="0.35"/>
    <text x="345" y="20" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#D4A843" text-anchor="middle">📦 JSON output</text>

    <rect x="415" width="100" height="30" rx="15" fill="#D4A843" fill-opacity="0.12" stroke="#D4A843" stroke-width="1" stroke-opacity="0.35"/>
    <text x="465" y="20" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#D4A843" text-anchor="middle">MIT License</text>
  </g>

  <!-- URL -->
  <text x="600" y="605" font-family="-apple-system, sans-serif" font-size="15" fill="#8FA3C0" text-anchor="middle">admirarr.dev</text>
</svg>
