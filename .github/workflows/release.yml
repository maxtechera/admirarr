name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

  installer:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build installer site
        run: |
          mkdir -p _site
          cp install.sh _site/install.sh
          cp install.ps1 _site/install.ps1

          # 404.html = shell script (GitHub Pages serves 404.html for the root path,
          # making `curl https://get.admirarr.dev | sh` work)
          cp install.sh _site/404.html

          cat > _site/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>⚓ Admirarr — Install</title>
            <style>
              body { font-family: monospace; max-width: 720px; margin: 80px auto; padding: 0 20px; background: #0d1117; color: #e6edf3; }
              h1 { color: #d4a843; }
              pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; }
              code { color: #79c0ff; }
              a { color: #58a6ff; }
            </style>
          </head>
          <body>
            <h1>⚓ Admirarr</h1>
            <p>Command your <em>*Arr</em> fleet.</p>
            <h2>Install</h2>
            <pre><code>curl -fsSL https://get.admirarr.dev | sh</code></pre>
            <h2>Windows</h2>
            <pre><code>irm https://get.admirarr.dev/install.ps1 | iex</code></pre>
            <p><a href="https://github.com/maxtechera/admirarr">GitHub →</a></p>
          </body>
          </html>
          HTMLEOF

          echo "get.admirarr.dev" > _site/CNAME
          touch _site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          commit_message: "chore: publish installer ${{ github.ref_name }} [skip ci]"

  aur:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Update AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: admirarr-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: "GitHub Actions"
          commit_email: "actions@github.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
