version: "2"

linters:
  default: standard

  disable:
    # errcheck: this codebase uses many intentional unchecked patterns
    # (defer closes, fire-and-forget exec.Cmd.Run, test helpers, ui spinners).
    # TODO: re-enable and fix incrementally.
    - errcheck

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives

    rules:
      # Test files: suppress errcheck and govet false positives in test helpers
      - path: "_test\\.go"
        linters:
          - errcheck
          - unused

      # Suppress staticcheck "QF" quickfix suggestions — improvements, not errors
      - linters:
          - staticcheck
        text: "^QF"

      # Suppress staticcheck "S1" simplification suggestions
      - linters:
          - staticcheck
        text: "^S1"
