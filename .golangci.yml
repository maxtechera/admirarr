version: "2"

# NOTE: This is the initial golangci-lint v2 config.
# The codebase has pre-existing lint debt from errcheck, govet, staticcheck,
# ineffassign, unused, and gofmt — all hidden by the prior broken Go 1.24 config.
# The lint job runs with continue-on-error: true while the debt is cleaned up.
# See: https://linear.app/neo/issue/NEO-417

linters:
  default: standard
  disable:
    # Pre-existing debt — being cleaned up incrementally. See NEO-417.
    - errcheck

issues:
  exclude-rules:
    # Pre-existing QF1012 debt: WriteString(fmt.Sprintf(...)) → fmt.Fprintf.
    # ~62 occurrences across the codebase. Tracked in NEO-417.
    - linters: [staticcheck]
      text: "QF1012"
